version: 0.4
name: memtier_benchmark-1Mkeys-bitmap-8B-bitpos-bit1-pos60
description: >
  Best-case benchmark for __builtin_clzl optimization in redisBitpos().
  1M small 8-byte bitmaps, each with a single bit set at position 60.
  BITPOS key 1 scans one word (trivial scan) then must locate bit 60 —
  baseline does 60 shift-loop iterations, optimized does 1 BSR instruction.
  This isolates the final-word bit-scan cost.
dbconfig:
  configuration-parameters:
    save: '""'
  check:
    keyspacelen: 1000000
  preload_tool:
    run_image: redislabs/memtier_benchmark:edge
    tool: memtier_benchmark
    arguments: >
      --hide-histogram
      --command "SETBIT __key__ 60 1"
      --key-maximum 1000000 --key-minimum 1
      --key-prefix "bm:" --command-key-pattern P --distinct-client-seed
      -n 500000 --pipeline 50 -c 50 -t 2
  resources:
    requests:
      cpus: '2'
      memory: 1g
  dataset_name: 1Mkeys-bitmap-8B-bit60
  dataset_description: 1M 8-byte bitmaps each with bit 60 set.
tested-commands:
- bitpos
tested-groups:
- bitmap
redis-topologies:
- oss-standalone
build-variants:
- gcc:15.2.0-amd64-debian-bookworm-default
- gcc:15.2.0-arm64-debian-bookworm-default
- dockerhub
clientconfig:
  run_image: redislabs/memtier_benchmark:edge
  tool: memtier_benchmark
  arguments: >
    --command "BITPOS __key__ 1"
    --key-maximum 1000000 --key-minimum 1
    --key-prefix "bm:" --command-key-pattern R --distinct-client-seed
    --hide-histogram
    --test-time 30
    -c 50 -t 2
  resources:
    requests:
      cpus: '2'
      memory: 2g
priority: 19
